name: the shipping lane

on:
  push:
    branches: ['**']

env:
  ACR_NAME: marketingparadiceacr
  RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  ENVIRONMENT: marketing-paradice-env
  POSTGRES_SERVER: marketing-paradice-pg
  POSTGRES_DATABASE: paradice
  POSTGRES_ADMIN_USER: paradice_admin

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build image
        run: |
          docker build -t backend:build \
            -f backend/Dockerfile backend/
      - name: Save image
        run: docker save backend:build | gzip > /tmp/backend.tar.gz
      - uses: actions/upload-artifact@v6
        with:
          name: backend-image
          path: /tmp/backend.tar.gz
          retention-days: 1

  build-pyworker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build image
        run: |
          docker build -t pyworker:build \
            -f pyworker/Dockerfile pyworker/
      - name: Save image
        run: docker save pyworker:build | gzip > /tmp/pyworker.tar.gz
      - uses: actions/upload-artifact@v6
        with:
          name: pyworker-image
          path: /tmp/pyworker.tar.gz
          retention-days: 1

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build image
        run: |
          docker build -t frontend:build \
            -f frontend/Dockerfile frontend/
      - name: Save image
        run: docker save frontend:build | gzip > /tmp/frontend.tar.gz
      - uses: actions/upload-artifact@v6
        with:
          name: frontend-image
          path: /tmp/frontend.tar.gz
          retention-days: 1

  provision:
    runs-on: ubuntu-latest
    if: github.ref_type == 'branch' && (github.ref_name == 'main' || github.ref_name == 'master' || startsWith(github.ref_name, 'demo/'))
    outputs:
      environment_name: ${{ steps.names.outputs.environment_name }}
      backend_app: ${{ steps.names.outputs.backend_app }}
      pyworker_app: ${{ steps.names.outputs.pyworker_app }}
      frontend_app: ${{ steps.names.outputs.frontend_app }}
      postgres_server: ${{ steps.names.outputs.postgres_server }}
      image_tag: ${{ steps.names.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v5

      - name: Validate deployment configuration
        run: |
          if [ -z "$RESOURCE_GROUP" ]; then
            echo "AZURE_RESOURCE_GROUP must be configured as a repository secret." >&2
            exit 1
          fi

      - name: Resolve deployment names
        id: names
        run: |
          BRANCH_NAME="${GITHUB_REF_NAME}"

          sanitize() {
            echo "$1" \
              | tr '[:upper:]' '[:lower:]' \
              | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//; s/-+/-/g'
          }

          if [ "$BRANCH_NAME" = "main" ] || [ "$BRANCH_NAME" = "master" ]; then
            ENVIRONMENT_NAME="${{ env.ENVIRONMENT }}"
            BACKEND_APP="backend"
            PYWORKER_APP="pyworker"
            FRONTEND_APP="frontend"
            POSTGRES_SERVER="${{ env.POSTGRES_SERVER }}"
            IMAGE_TAG="latest"
          elif [[ "$BRANCH_NAME" == demo/* ]]; then
            RAW_SLUG="${BRANCH_NAME#demo/}"
            SLUG=$(sanitize "$RAW_SLUG" | cut -c1-40)
            if [ -z "$SLUG" ]; then
              echo "Demo branch must include a usable slug after demo/." >&2
              exit 1
            fi
            PREFIX="demo-${SLUG}"
            ENVIRONMENT_NAME="${PREFIX}-env"
            BACKEND_APP="${PREFIX}-backend"
            PYWORKER_APP="${PREFIX}-pyworker"
            FRONTEND_APP="${PREFIX}-frontend"
            POSTGRES_SERVER="${PREFIX}-pg"
            IMAGE_TAG="$SLUG"
          else
            echo "Branch '$BRANCH_NAME' is not deployable."
            exit 1
          fi

          echo "environment_name=$ENVIRONMENT_NAME" >> "$GITHUB_OUTPUT"
          echo "backend_app=$BACKEND_APP" >> "$GITHUB_OUTPUT"
          echo "pyworker_app=$PYWORKER_APP" >> "$GITHUB_OUTPUT"
          echo "frontend_app=$FRONTEND_APP" >> "$GITHUB_OUTPUT"
          echo "postgres_server=$POSTGRES_SERVER" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

          echo "Environment: $ENVIRONMENT_NAME"
          echo "Backend app: $BACKEND_APP"
          echo "Pyworker app: $PYWORKER_APP"
          echo "Frontend app: $FRONTEND_APP"
          echo "PostgreSQL server: $POSTGRES_SERVER"
          echo "Docker image tag: $IMAGE_TAG"

      - name: Login to Azure
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Resolve location
        env:
          ENVIRONMENT_NAME: ${{ steps.names.outputs.environment_name }}
        run: |
          EXISTING_LOCATION=$(az containerapp env show \
            --name "$ENVIRONMENT_NAME" \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query location -o tsv 2>/dev/null || true)

          if [ -n "$EXISTING_LOCATION" ]; then
            LOCATION=$(echo "$EXISTING_LOCATION" | tr '[:upper:]' '[:lower:]' | tr -d ' ')
          else
            AVAILABLE=$(az account list-locations --query "[].name" -o tsv)
            LOCATION=""
            for candidate in finlandcentral finlandnorth swedencentral norwayeast northeurope westeurope; do
              if echo "$AVAILABLE" | grep -qx "$candidate"; then
                LOCATION="$candidate"
                break
              fi
            done
            if [ -z "$LOCATION" ]; then
              echo "No preferred European Azure location is available." >&2
              exit 1
            fi
          fi

          echo "Using Azure location: $LOCATION"
          echo "LOCATION=$LOCATION" >> "$GITHUB_ENV"

      - name: Provision ACR
        run: |
          if az acr show --name ${{ env.ACR_NAME }} &>/dev/null; then
            echo "ACR '${{ env.ACR_NAME }}' already exists, skipping."
          else
            echo "Creating ACR '${{ env.ACR_NAME }}'..."
            az acr create \
              --name ${{ env.ACR_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --location "$LOCATION" \
              --sku Basic \
              --admin-enabled true
          fi

      - name: Provision Container Apps environment
        env:
          ENVIRONMENT_NAME: ${{ steps.names.outputs.environment_name }}
        run: |
          if az containerapp env show --name "$ENVIRONMENT_NAME" --resource-group ${{ env.RESOURCE_GROUP }} &>/dev/null; then
            echo "Environment '$ENVIRONMENT_NAME' already exists, skipping."
          else
            echo "Creating environment '$ENVIRONMENT_NAME'..."
            az containerapp env create \
              --name "$ENVIRONMENT_NAME" \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --location "$LOCATION"
          fi

      - name: Provision PostgreSQL
        id: postgres
        env:
          POSTGRES_SERVER: ${{ steps.names.outputs.postgres_server }}
        run: |
          if az postgres flexible-server show --name "$POSTGRES_SERVER" --resource-group ${{ env.RESOURCE_GROUP }} &>/dev/null; then
            echo "PostgreSQL server '$POSTGRES_SERVER' already exists, leaving credentials unchanged."
          else
            echo "Creating PostgreSQL server '$POSTGRES_SERVER'..."
            DB_PASSWORD="P9a$(openssl rand -base64 32 | tr -dc 'A-Za-z0-9' | cut -c1-24)"
            DATABASE_URL="postgresql://${{ env.POSTGRES_ADMIN_USER }}:${DB_PASSWORD}@${POSTGRES_SERVER}.postgres.database.azure.com:5432/${{ env.POSTGRES_DATABASE }}?sslmode=require"
            echo "::add-mask::$DATABASE_URL"

            az postgres flexible-server create \
              --name "$POSTGRES_SERVER" \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --location "$LOCATION" \
              --admin-user ${{ env.POSTGRES_ADMIN_USER }} \
              --admin-password "$DB_PASSWORD" \
              --version 16 \
              --tier Burstable \
              --sku-name Standard_B1ms \
              --storage-size 32 \
              --public-access 0.0.0.0 \
              --yes \
              --output none

            az postgres flexible-server db create \
              --server-name "$POSTGRES_SERVER" \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --name ${{ env.POSTGRES_DATABASE }} \
              --output none

            echo "DATABASE_URL=$DATABASE_URL" >> "$GITHUB_ENV"
          fi

      - name: Provision container apps
        env:
          ENVIRONMENT_NAME: ${{ steps.names.outputs.environment_name }}
          BACKEND_APP: ${{ steps.names.outputs.backend_app }}
          PYWORKER_APP: ${{ steps.names.outputs.pyworker_app }}
          FRONTEND_APP: ${{ steps.names.outputs.frontend_app }}
        run: |
          ACR_PASS=$(az acr credential show --name ${{ env.ACR_NAME }} --query "passwords[0].value" -o tsv)

          provision_app() {
            NAME="$1"
            CONFIG="$2"

            PORT=$(jq -r '.targetPort' "$CONFIG")
            INGRESS=$(jq -r '.ingress' "$CONFIG")
            CPU=$(jq -r '.cpu' "$CONFIG")
            MEMORY=$(jq -r '.memory' "$CONFIG")
            MIN_REPLICAS=$(jq -r '.minReplicas' "$CONFIG")
            MAX_REPLICAS=$(jq -r '.maxReplicas' "$CONFIG")

            if az containerapp show --name "$NAME" --resource-group ${{ env.RESOURCE_GROUP }} &>/dev/null; then
              echo "Container app '$NAME' already exists, skipping."
            else
              echo "Creating container app '$NAME'..."
              az containerapp create \
                --name "$NAME" \
                --resource-group ${{ env.RESOURCE_GROUP }} \
                --environment "$ENVIRONMENT_NAME" \
                --image mcr.microsoft.com/k8se/quickstart:latest \
                --registry-server ${{ env.ACR_NAME }}.azurecr.io \
                --registry-username ${{ env.ACR_NAME }} \
                --registry-password "$ACR_PASS" \
                --target-port "$PORT" \
                --ingress "$INGRESS" \
                --min-replicas "$MIN_REPLICAS" --max-replicas "$MAX_REPLICAS" \
                --cpu "$CPU" --memory "$MEMORY"
            fi
          }

          provision_app "$BACKEND_APP" backend/containerapp.json
          provision_app "$PYWORKER_APP" pyworker/containerapp.json
          provision_app "$FRONTEND_APP" frontend/containerapp.json

      - name: Configure provisioned apps
        env:
          BACKEND_APP: ${{ steps.names.outputs.backend_app }}
          PYWORKER_APP: ${{ steps.names.outputs.pyworker_app }}
          FRONTEND_APP: ${{ steps.names.outputs.frontend_app }}
        run: |
          if [ -n "$DATABASE_URL" ]; then
            echo "Storing DATABASE_URL as Container Apps secret."
            az containerapp secret set \
              --name "$BACKEND_APP" \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --secrets "database-url=$DATABASE_URL"
            az containerapp secret set \
              --name "$PYWORKER_APP" \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --secrets "database-url=$DATABASE_URL"
          else
            echo "No new DATABASE_URL generated; leaving database-url secrets unchanged."
          fi

          BACKEND_FQDN=$(az containerapp show --name "$BACKEND_APP" --resource-group ${{ env.RESOURCE_GROUP }} --query 'properties.configuration.ingress.fqdn' -o tsv)
          PYWORKER_FQDN=$(az containerapp show --name "$PYWORKER_APP" --resource-group ${{ env.RESOURCE_GROUP }} --query 'properties.configuration.ingress.fqdn' -o tsv)

          echo "Setting BACKEND_URL on frontend to https://$BACKEND_FQDN"
          az containerapp update \
            --name "$FRONTEND_APP" \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --set-env-vars "BACKEND_URL=https://$BACKEND_FQDN"

          echo "Setting PYWORKER_URL on backend to https://$PYWORKER_FQDN"
          az containerapp update \
            --name "$BACKEND_APP" \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --set-env-vars "PYWORKER_URL=https://$PYWORKER_FQDN" "DATABASE_URL=secretref:database-url"

          echo "Setting DATABASE_URL on pyworker from secret reference"
          az containerapp update \
            --name "$PYWORKER_APP" \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --set-env-vars "DATABASE_URL=secretref:database-url"

  push-backend:
    runs-on: ubuntu-latest
    needs: [build-backend, provision]
    if: always() && needs.build-backend.result == 'success' && needs.provision.result == 'success'
    outputs:
      image_ref: ${{ steps.push.outputs.image_ref }}
    steps:
      - name: Login to Azure
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}
      - uses: actions/download-artifact@v7
        with:
          name: backend-image
      - name: Push image
        id: push
        env:
          IMAGE_TAG: ${{ needs.provision.outputs.image_tag }}
        run: |
          REPOSITORY="${{ env.ACR_NAME }}.azurecr.io/backend"
          IMAGE_REF="$REPOSITORY:$IMAGE_TAG"
          gunzip -c backend.tar.gz | docker load
          docker tag backend:build "$IMAGE_REF"
          if ! PUSH_OUTPUT=$(docker push "$IMAGE_REF" 2>&1); then
            echo "$PUSH_OUTPUT"
            exit 1
          fi
          echo "$PUSH_OUTPUT"
          DIGEST=$(printf '%s\n' "$PUSH_OUTPUT" | awk '/digest:/ { print $3 }' | tail -n 1)
          if [ -z "$DIGEST" ]; then
            echo "Could not determine pushed backend image digest." >&2
            exit 1
          fi
          echo "image_ref=$REPOSITORY@$DIGEST" >> "$GITHUB_OUTPUT"

  push-pyworker:
    runs-on: ubuntu-latest
    needs: [build-pyworker, provision]
    if: always() && needs.build-pyworker.result == 'success' && needs.provision.result == 'success'
    outputs:
      image_ref: ${{ steps.push.outputs.image_ref }}
    steps:
      - name: Login to Azure
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}
      - uses: actions/download-artifact@v7
        with:
          name: pyworker-image
      - name: Push image
        id: push
        env:
          IMAGE_TAG: ${{ needs.provision.outputs.image_tag }}
        run: |
          REPOSITORY="${{ env.ACR_NAME }}.azurecr.io/pyworker"
          IMAGE_REF="$REPOSITORY:$IMAGE_TAG"
          gunzip -c pyworker.tar.gz | docker load
          docker tag pyworker:build "$IMAGE_REF"
          if ! PUSH_OUTPUT=$(docker push "$IMAGE_REF" 2>&1); then
            echo "$PUSH_OUTPUT"
            exit 1
          fi
          echo "$PUSH_OUTPUT"
          DIGEST=$(printf '%s\n' "$PUSH_OUTPUT" | awk '/digest:/ { print $3 }' | tail -n 1)
          if [ -z "$DIGEST" ]; then
            echo "Could not determine pushed pyworker image digest." >&2
            exit 1
          fi
          echo "image_ref=$REPOSITORY@$DIGEST" >> "$GITHUB_OUTPUT"

  push-frontend:
    runs-on: ubuntu-latest
    needs: [build-frontend, provision]
    if: always() && needs.build-frontend.result == 'success' && needs.provision.result == 'success'
    outputs:
      image_ref: ${{ steps.push.outputs.image_ref }}
    steps:
      - name: Login to Azure
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}
      - uses: actions/download-artifact@v7
        with:
          name: frontend-image
      - name: Push image
        id: push
        env:
          IMAGE_TAG: ${{ needs.provision.outputs.image_tag }}
        run: |
          REPOSITORY="${{ env.ACR_NAME }}.azurecr.io/frontend"
          IMAGE_REF="$REPOSITORY:$IMAGE_TAG"
          gunzip -c frontend.tar.gz | docker load
          docker tag frontend:build "$IMAGE_REF"
          if ! PUSH_OUTPUT=$(docker push "$IMAGE_REF" 2>&1); then
            echo "$PUSH_OUTPUT"
            exit 1
          fi
          echo "$PUSH_OUTPUT"
          DIGEST=$(printf '%s\n' "$PUSH_OUTPUT" | awk '/digest:/ { print $3 }' | tail -n 1)
          if [ -z "$DIGEST" ]; then
            echo "Could not determine pushed frontend image digest." >&2
            exit 1
          fi
          echo "image_ref=$REPOSITORY@$DIGEST" >> "$GITHUB_OUTPUT"

  deploy-backend:
    runs-on: ubuntu-latest
    needs: [push-backend, provision]
    if: always() && needs.push-backend.result == 'success' && needs.provision.result == 'success'
    steps:
      - name: Login to Azure
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Deploy backend
        run: |
          az containerapp update \
            --name ${{ needs.provision.outputs.backend_app }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ needs.push-backend.outputs.image_ref }}

  deploy-pyworker:
    runs-on: ubuntu-latest
    needs: [push-pyworker, provision]
    if: always() && needs.push-pyworker.result == 'success' && needs.provision.result == 'success'
    steps:
      - name: Login to Azure
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Deploy pyworker
        run: |
          az containerapp update \
            --name ${{ needs.provision.outputs.pyworker_app }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ needs.push-pyworker.outputs.image_ref }}

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: [push-frontend, provision]
    if: always() && needs.push-frontend.result == 'success' && needs.provision.result == 'success'
    steps:
      - name: Login to Azure
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Deploy frontend
        run: |
          az containerapp update \
            --name ${{ needs.provision.outputs.frontend_app }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ needs.push-frontend.outputs.image_ref }}
